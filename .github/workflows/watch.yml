name: RM Watcher

on:
  schedule:
    # Full sweep cada 6h (offset :41 evita choque con bitnest-watcher :23)
    - cron: '41 */6 * * *'
    # Light (RM1 + RM2 + RM8) cada 1h para drain/freeze detection rápido
    - cron: '47 * * * *'
    # Digest diario solo-números (17:11 UTC ≈ 11:11 GT)
    - cron: '11 17 * * *'
  workflow_dispatch:
    inputs:
      digest:
        description: 'Forzar digest diario'
        required: false
        default: 'false'

permissions:
  contents: write

# Serializa runs para evitar la carrera de git push (rechazo "fetch first")
# cuando el cron de 1h y el de 6h coinciden. No cancela el run en curso.
concurrency:
  group: rm-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests mmh3

      - name: Determine cadence
        id: cadence
        run: |
          minute=$(date -u +%M)
          hour=$(date -u +%H)
          if [ "$minute" = "41" ]; then
            echo "cadence=6h" >> $GITHUB_OUTPUT
          else
            echo "cadence=1h" >> $GITHUB_OUTPUT
          fi
          if { [ "$hour" = "17" ] && [ "$minute" = "11" ]; } || [ "${{ github.event.inputs.digest }}" = "true" ]; then
            echo "digest=1" >> $GITHUB_OUTPUT
          else
            echo "digest=" >> $GITHUB_OUTPUT
          fi

      - name: Run watcher
        env:
          WATCHER_CADENCE: ${{ steps.cadence.outputs.cadence }}
          WATCHER_DIGEST: ${{ steps.cadence.outputs.digest }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RM_THREAD_ID: ${{ secrets.TELEGRAM_RM_THREAD_ID }}
          TELEGRAM_BITRADEX_THREAD_ID: ${{ secrets.TELEGRAM_BITRADEX_THREAD_ID }}
          FERNANDO_TRON_WALLET: ${{ secrets.FERNANDO_TRON_WALLET }}
        run: python watcher.py

      - name: Run domain tracker (rastreo dominio rotatorio)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RM_THREAD_ID: ${{ secrets.TELEGRAM_RM_THREAD_ID }}
          TELEGRAM_BITRADEX_THREAD_ID: ${{ secrets.TELEGRAM_BITRADEX_THREAD_ID }}
        run: python domain_tracker.py || echo "domain_tracker best-effort (crt.sh puede estar caído)"

      - name: Run cazador reverse-IP watch (detector proactivo dominio RM nuevo)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_RM_THREAD_ID: ${{ secrets.TELEGRAM_RM_THREAD_ID }}
        run: python cazador_reverse_ip_watch.py || echo "cazador reverse-IP best-effort"

      - name: Commit state if changed
        run: |
          git config user.name "rm-watcher-bot"
          git config user.email "bot@automatiza.ia"
          git add state.json domains.json cazador_ip_state.json
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "watcher: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
